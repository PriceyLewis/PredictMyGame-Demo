{% extends "base.html" %}
{% block content %}
<div class="container mx-auto py-8">
  <h2 class="text-2xl font-bold mb-6">📊 Progress Over Time</h2>

  <canvas id="avgChart" height="100"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('avgChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: {{ labels|safe }},
        datasets: [{
          label: 'Average %',
          data: {{ averages|safe }},
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 5
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true,
            max: 100,
            title: {
              display: true,
              text: 'Average %'
            }
          },
          x: {
            title: {
              display: true,
              text: 'Snapshot Date'
            }
          }
        },
        plugins: {
          legend: { display: true },
          tooltip: { enabled: true }
        }
      }
    });
  </script>
</div>
{% endblock %}
