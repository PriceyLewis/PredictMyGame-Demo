{% extends "base.html" %}
{% block title %}Import Modules – PredictMyGrade{% endblock %}
{% block content %}
<div class="container mt-5">
  <h2 class="mb-4 text-center">Import Modules from CSV</h2>
  <div class="card shadow p-4 mx-auto" style="max-width:500px;">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <input type="file" name="file" accept=".csv" class="form-control" required>
      </div>
      <button class="btn btn-primary w-100">Upload and Import</button>
    </form>
  </div>
</div>
{% endblock %}
