{% extends "base.html" %}
{% block title %}Predict Next Module – PredictMyGrade{% endblock %}

{% block content %}
<div class="container mt-5">
  <h2 class="text-center mb-4">Predict Next Module Performance</h2>
  <div class="card shadow p-4 mx-auto" style="max-width:600px;">
    <form id="predictForm">
      <div class="mb-3">
        <label class="form-label">Average So Far (%)</label>
        <input type="number" class="form-control" id="avg_so_far" min="0" max="100" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Credits Completed</label>
        <input type="number" class="form-control" id="credits_done" min="0" max="120" step="20" required>
      </div>
      <button class="btn btn-success w-100">Predict</button>
    </form>
    <p id="result" class="mt-3 text-center fs-5 fw-bold"></p>
  </div>
</div>

<script>
document.getElementById("predictForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const avg = parseFloat(document.getElementById("avg_so_far").value);
  const cr  = parseFloat(document.getElementById("credits_done").value);
  const result = document.getElementById("result");
  result.textContent = "⏳ Predicting...";

  try {
    const res = await fetch("/ml/predict/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCookie("csrftoken")
      },
      body: JSON.stringify({ avg_so_far: avg, credits_done: cr })
    });
    const data = await res.json();
    if (data.ok) {
      const p = data.pred.toFixed(2);
      result.textContent = data.fallback ?
        `Predicted ≈ ${p}% (fallback mode)` :
        `Predicted next-module mark: ${p}%`;
    } else {
      result.textContent = "⚠️ Prediction failed.";
    }
  } catch (err) {
    result.textContent = "❌ Network error.";
  }
});

function getCookie(name) {
  const value = `; ${document.cookie}`;
  const parts = value.split(`; ${name}=`);
  if (parts.length === 2) return parts.pop().split(";").shift();
}
</script>
{% endblock %}
